name: CFVPN Manual CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manual-ci:
    name: Manual Build / Test / Analyze
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Fetch native VPN engine sources
      run: |
        mkdir -p app/libs
        curl -sL -o app/libs/libv2ray.aar \
          https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar
        git clone --recursive https://github.com/heiher/hev-socks5-tunnel \
          app/src/main/jni/hev-socks5-tunnel

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Run Tests (Manual)
      run: ./gradlew testDebugUnitTest --stacktrace --no-daemon

    - name: Build Debug APK (Manual)
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Build Release APK (Manual)
      run: ./gradlew assembleRelease --stacktrace --no-daemon

    - name: Upload APKs (Manual)
      uses: actions/upload-artifact@v4
      with:
        name: CFVPN-APKs
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        if-no-files-found: ignore
