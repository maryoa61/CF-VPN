name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test CFVPN
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: 'gradle'

    - name: Write Debug Keystore Base64
      run: echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" > debug.keystore.base64

    - name: Decode Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ]; then
          echo "Decoding debug keystore..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "No debug.keystore.base64 found, skipping decode."
        fi

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Download Clean Gradle Wrapper JAR
      run: |
        mkdir -p gradle/wrapper
        curl -sL https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

    - name: Run Unit & Robolectric Tests
      run: ./gradlew testDebugUnitTest --no-configuration-cache --stacktrace

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: app/build/reports/tests/testDebugUnitTest/
        if-no-files-found: ignore

    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CFVPN-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        if-no-files-found: error
